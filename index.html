<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mini App Demo</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 16px;
            min-height: 100vh;
        }

        .card {
            background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .card h2 {
            font-size: 16px;
            color: var(--tg-theme-subtitle-text-color, #999);
            margin-bottom: 12px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--tg-theme-bg-color, #e0e0e0);
            font-size: 14px;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: var(--tg-theme-hint-color, #999);
        }

        .info-value {
            font-weight: 600;
            color: var(--tg-theme-text-color, #000);
            text-align: right;
            max-width: 60%;
            word-break: break-all;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
            transition: opacity 0.2s;
        }

        .btn:active {
            opacity: 0.7;
        }

        .btn-primary {
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
        }

        .btn-danger {
            background-color: var(--tg-theme-destructive-text-color, #e53935);
            color: #fff;
        }

        .btn-reward {
            background: linear-gradient(135deg, #f59e0b, #f97316);
            color: #fff;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        #counter-display {
            text-align: center;
            font-size: 48px;
            font-weight: 700;
            padding: 24px 0;
            color: var(--tg-theme-accent-text-color, var(--tg-theme-button-color, #3390ec));
        }

        .reward-section {
            text-align: center;
            padding: 10px 0 4px;
            font-size: 13px;
            color: var(--tg-theme-hint-color, #999);
        }

        .ad-status {
            text-align: center;
            font-size: 12px;
            color: var(--tg-theme-hint-color, #aaa);
            padding: 6px 0;
            min-height: 24px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>用户信息</h2>
        <div id="user-info">加载中...</div>
    </div>

    <div class="card">
        <h2>计数器</h2>
        <div id="counter-display">0</div>
        <button class="btn btn-primary" id="btn-increment">+1</button>
        <button class="btn btn-danger" id="btn-decrement">-1</button>
        <div class="reward-section">看一段广告，计数 +5</div>
        <button class="btn btn-reward" id="btn-reward">观看广告领取奖励</button>
        <div class="ad-status" id="ad-status"></div>
    </div>

    <div class="card">
        <h2>平台信息</h2>
        <div id="platform-info"></div>
    </div>

    <script>
        // ========== 初始化 Telegram ==========
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // ========== 用户信息 ==========
        const user = tg.initDataUnsafe?.user;
        const userInfoEl = document.getElementById('user-info');

        if (user) {
            userInfoEl.innerHTML = `
                <div class="info-row">
                    <span class="info-label">ID</span>
                    <span class="info-value">${user.id}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">姓名</span>
                    <span class="info-value">${user.first_name} ${user.last_name || ''}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">用户名</span>
                    <span class="info-value">${user.username ? '@' + user.username : '无'}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">语言</span>
                    <span class="info-value">${user.language_code || '未知'}</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Premium</span>
                    <span class="info-value">${user.is_premium ? '✓' : '✗'}</span>
                </div>
            `;
        } else {
            userInfoEl.textContent = '未获取到用户信息（可能在浏览器中直接打开）';
        }

        // ========== 平台信息 ==========
        document.getElementById('platform-info').innerHTML = `
            <div class="info-row">
                <span class="info-label">平台</span>
                <span class="info-value">${tg.platform}</span>
            </div>
            <div class="info-row">
                <span class="info-label">Bot API 版本</span>
                <span class="info-value">${tg.version}</span>
            </div>
            <div class="info-row">
                <span class="info-label">主题</span>
                <span class="info-value">${tg.colorScheme}</span>
            </div>
        `;

        // ========== 计数器 ==========
        let count = 0;
        const counterDisplay = document.getElementById('counter-display');
        const adStatus = document.getElementById('ad-status');
        const btnReward = document.getElementById('btn-reward');

        function updateCounter(delta) {
            count += delta;
            counterDisplay.textContent = count;
        }

        document.getElementById('btn-increment').addEventListener('click', () => {
            updateCounter(1);
            tg.HapticFeedback.impactOccurred('light');
        });

        document.getElementById('btn-decrement').addEventListener('click', () => {
            updateCounter(-1);
            tg.HapticFeedback.impactOccurred('rigid');
        });

        // ========== Adsgram 插屏广告 ==========
        let AdController = null;

        if (window.Adsgram) {
            AdController = window.Adsgram.init({ blockId: "int-36875" });
            adStatus.textContent = 'Adsgram SDK 已就绪';
        } else {
            adStatus.textContent = 'Adsgram SDK 未加载';
        }

        btnReward.addEventListener('click', () => {
            if (!AdController) {
                adStatus.textContent = 'SDK 未加载，请稍后再试';
                return;
            }

            btnReward.disabled = true;
            adStatus.textContent = '正在播放广告...';

            AdController.show()
                .then((result) => {
                    // 插屏广告：用户看完或主动关闭，都算 done
                    updateCounter(5);
                    tg.HapticFeedback.notificationOccurred('success');
                    adStatus.textContent = '奖励已发放 +5！';
                })
                .catch((result) => {
                    // 播放出错或无广告
                    adStatus.textContent = result.description || '广告播放失败，请稍后重试';
                })
                .finally(() => {
                    btnReward.disabled = false;
                });
        });

        // ========== 底部主按钮 ==========
        tg.MainButton.setText('发送计数结果到 Bot');
        tg.MainButton.show();

        tg.MainButton.onClick(() => {
            tg.showConfirm(`确定要发送当前计数 ${count} 吗？`, (confirmed) => {
                if (confirmed) {
                    try {
                        tg.sendData(JSON.stringify({ action: 'counter_result', value: count }));
                    } catch (e) {
                        tg.showAlert(`当前计数: ${count}\n(sendData 仅在 KeyboardButton 模式可用)`);
                    }
                }
            });
        });
    </script>
</body>
</html>
